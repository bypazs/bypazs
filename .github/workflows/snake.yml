# ════════════════════════════════════════════════════════════
#  Snake contribution animation generator
#  Place this file at:  .github/workflows/snake.yml
#  (create the folders if they don't exist)
#
#  After committing:
#   1. Go to your repo → Actions tab → enable workflows if prompted
#   2. Open "Generate Snake" → Run workflow (first run is manual)
#   3. It commits snake.svg to the `output` branch, which the README embeds
#  After that it auto-runs every 12 hours.
# ════════════════════════════════════════════════════════════
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # allow manual run
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake.svg (bright green, visible on dark bg)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=%2300FF41&color_dots=%23161B22,%230E4429,%23006D32,%2326A641,%2339D353

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
