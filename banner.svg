<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" width="820" height="280" role="img" aria-label="bypazs terminal">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02040a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00FF41"/>
      <stop offset="0.5" stop-color="#0aff9d"/>
      <stop offset="1" stop-color="#00FF41"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text { font-family: 'Fira Code','Cascadia Code',Consolas,'Courier New',monospace; }
      .ln { opacity: 0; }
      .l1 { animation: k1 8s infinite; }
      .l2 { animation: k2 8s infinite; }
      .l3 { animation: k3 8s infinite; }
      .l4 { animation: k4 8s infinite; }
      .cur { animation: blink 1s steps(1) infinite; }
      .scan { animation: scan 6s linear infinite; }
      @keyframes k1 { 0%,2%{opacity:0} 6%,92%{opacity:1} 100%{opacity:0} }
      @keyframes k2 { 0%,16%{opacity:0} 20%,92%{opacity:1} 100%{opacity:0} }
      @keyframes k3 { 0%,32%{opacity:0} 37%,92%{opacity:1} 100%{opacity:0} }
      @keyframes k4 { 0%,52%{opacity:0} 58%,92%{opacity:1} 100%{opacity:0} }
      @keyframes blink { 0%{opacity:1} 50%{opacity:0} 100%{opacity:1} }
      @keyframes scan { 0%{transform:translateY(54px)} 100%{transform:translateY(268px)} }
    </style>
  </defs>

  <!-- window -->
  <rect x="6" y="6" width="808" height="268" rx="12" fill="url(#bgGrad)" stroke="url(#edge)" stroke-width="1.4" stroke-opacity="0.7"/>
  <!-- title bar -->
  <rect x="6" y="6" width="808" height="40" rx="12" fill="#0b1220"/>
  <rect x="6" y="30" width="808" height="16" fill="#0b1220"/>
  <circle cx="30" cy="26" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="26" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="26" r="6" fill="#27c93f"/>
  <text x="410" y="31" text-anchor="middle" font-size="13" fill="#5b6b7a">bypazs@offsec: ~ — zsh</text>

  <!-- faint moving scanline -->
  <rect class="scan" x="6" y="0" width="808" height="2" fill="#00FF41" opacity="0.06"/>

  <!-- body -->
  <g filter="url(#glow)" font-size="17">
    <text class="ln l1" x="28" y="86"  fill="#e6edf3">$ <tspan fill="#00FF41">sudo</tspan> -i</text>
    <text class="ln l2" x="28" y="120" fill="#8b9bab">[sudo] password for bypazs: ••••••••</text>
    <text class="ln l3" x="28" y="154" fill="#e6edf3">root@offsec:~# <tspan fill="#0aff9d">./recon-agent --target @bypazs</tspan></text>
    <text class="ln l4" x="28" y="200" fill="#00FF41" font-size="19" font-weight="700">[+] OSCP · eWPTX · 14x CVE  →  access granted</text>
  </g>

  <!-- prompt + blinking cursor -->
  <g font-size="17">
    <text x="28" y="240" fill="#e6edf3">root@offsec:~#</text>
    <rect class="cur" x="172" y="226" width="11" height="18" fill="#00FF41"/>
  </g>
</svg>
